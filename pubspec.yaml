name: threaditate
description: "Threaditate mobile - string art from photos"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter

  # State management
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0

  # Data classes / unions
  freezed_annotation: ^3.1.0

  # Routing
  go_router: ^17.2.3

  # Media + image
  image: ^4.8.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  json_annotation: ^4.11.0
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2

  # Persistence
  shared_preferences: ^2.5.5

  # Backend
  supabase_flutter: ^2.12.4

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  integration_test:
    sdk: flutter
  json_serializable: ^6.13.0
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.3
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - .env
